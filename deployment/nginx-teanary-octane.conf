server
{
    listen 80;
    #listen [::]:80;
    server_name *.teanary.com;
    
    return 301 https://teanary.com$request_uri;
}

server
{
    listen 80;
    #listen [::]:80;
    server_name asset.teanary.com;
    
    return 301 https://asset.teanary.com$request_uri;
}

server
{
    listen 443 ssl;
    #listen [::]:443 ssl;
    server_name www.teanary.com;

    ssl_certificate /usr/local/nginx/conf/ssl/teanary.com/fullchain.cer;
    ssl_certificate_key /usr/local/nginx/conf/ssl/teanary.com/teanary.com.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "TLS13-AES-256-GCM-SHA384:TLS13-CHACHA20-POLY1305-SHA256:TLS13-AES-128-GCM-SHA256:TLS13-AES-128-CCM-8-SHA256:TLS13-AES-128-CCM-SHA256:EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5";
    ssl_session_cache builtin:1000 shared:SSL:10m;
    # openssl dhparam -out /usr/local/nginx/conf/ssl/dhparam.pem 2048
    ssl_dhparam /usr/local/nginx/conf/ssl/dhparam.pem;

    return 301 https://teanary.com$request_uri;
}

server
{
    listen 443 ssl;
    #listen [::]:443 ssl;
    server_name teanary.com;
    index index.html index.htm index.php default.html default.htm default.php;
    root  /home/wwwroot/teanary/current/public;

    ssl_certificate /usr/local/nginx/conf/ssl/teanary.com/fullchain.cer;
    ssl_certificate_key /usr/local/nginx/conf/ssl/teanary.com/teanary.com.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "TLS13-AES-256-GCM-SHA384:TLS13-CHACHA20-POLY1305-SHA256:TLS13-AES-128-GCM-SHA256:TLS13-AES-128-CCM-8-SHA256:TLS13-AES-128-CCM-SHA256:EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5";
    ssl_session_cache builtin:1000 shared:SSL:10m;
    # openssl dhparam -out /usr/local/nginx/conf/ssl/dhparam.pem 2048
    ssl_dhparam /usr/local/nginx/conf/ssl/dhparam.pem;

    # 安全头设置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 静态文件重定向到 CDN 域名
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        return 301 https://asset.teanary.com$request_uri;
    }

    # 媒体文件重定向到 CDN 域名
    location ~* \.(gif|jpg|jpeg|png|bmp|swf|mp4|webm|ogg|mp3|wav)$ {
        return 301 https://asset.teanary.com$request_uri;
    }

    # 字体文件重定向到 CDN 域名
    location ~* \.(woff|woff2|ttf|eot)$ {
        return 301 https://asset.teanary.com$request_uri;
    }

    # 安全配置 - 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问敏感文件
    location ~* \.(env|log|sql|conf|ini)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 允许访问 .well-known 目录（用于 SSL 验证等）
    location ~ /.well-known {
        allow all;
        try_files $uri =404;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 主要应用代理到 Octane
    location / {
        try_files $uri @octane;
    }

    # Octane 代理配置
    location @octane {
        # 代理到 Octane 服务
        proxy_pass http://127.0.0.1:8000;
        
        # 代理头设置
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 缓存控制
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # 访问日志
    access_log  /home/wwwlogs/teanary.com.log;
    error_log   /home/wwwlogs/teanary.com.error.log;
}

server
{
    listen 443 ssl;
    #listen [::]:443 ssl;
    server_name asset.teanary.com;
    root  /home/wwwroot/teanary/current/public;

    ssl_certificate /usr/local/nginx/conf/ssl/teanary.com/fullchain.cer;
    ssl_certificate_key /usr/local/nginx/conf/ssl/teanary.com/teanary.com.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "TLS13-AES-256-GCM-SHA384:TLS13-CHACHA20-POLY1305-SHA256:TLS13-AES-128-GCM-SHA256:TLS13-AES-128-CCM-8-SHA256:TLS13-AES-128-CCM-SHA256:EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5";
    ssl_session_cache builtin:1000 shared:SSL:10m;
    ssl_dhparam /usr/local/nginx/conf/ssl/dhparam.pem;

    # 安全头设置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 静态文件缓存策略
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
        access_log off;
    }

    # 媒体文件缓存
    location ~* \.(gif|jpg|jpeg|png|bmp|swf|mp4|webm|ogg|mp3|wav)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
        access_log off;
    }

    # 字体文件
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
        access_log off;
    }

    # 安全配置 - 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问敏感文件
    location ~* \.(env|log|sql|conf|ini|php)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 允许访问 .well-known 目录
    location ~ /.well-known {
        allow all;
        try_files $uri =404;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 默认返回 404
    location / {
        return 404;
    }

    # 访问日志
    access_log  /home/wwwlogs/asset.teanary.com.log;
    error_log   /home/wwwlogs/asset.teanary.com.error.log;
}
