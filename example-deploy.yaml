# Deployer 配置文件
# 
# 推荐：将 SSH 配置（identity_file, port）放在 ~/.ssh/config 中
#
# 示例 ~/.ssh/config 配置：
# Host teanary-online
#     HostName 192.168.1.1
#     User root
#     IdentityFile ~/.ssh/test.key
#     Port 22
#
# 使用 labels 选择主机部署：
# dep deploy stage=production
# dep deploy role=web
# dep deploy stage=production&role=online

# 导入 Laravel recipe
import:
  - recipe/laravel.php

# 基础配置
config:
  repository: git@gitee.com:teanary/teanary_service.git
  keep_releases: 3
  default_stage: production
  shared_files:
    - .env
    - public/sitemap.xml
  shared_dirs:
    - storage
  writable_dirs:
    - storage
    - bootstrap/cache
    - public

# 主机配置
hosts:
  teanary-demo:
    hostname: 192.168.1.1
    remote_user: deployer
    deploy_path: /home/wwwroot/teanary-demo
    branch: dev
    http_user: www
    identity_file: ~/.ssh/demo.key
    port: 5022
    labels:
      stage: demo
      role: demo

# 任务定义
tasks:
  # 前端构建任务
  npm:build:
    - cd: "{{release_path}}"
    - run: "npm ci --prefer-offline --no-audit"
    - run: "npm run build"
    - run: "rm -rf node_modules tests printer_server"
    - run: "mv public/vendor/livewire public/ 2>/dev/null || true"

  # Filament 缓存优化
  artisan:filament:optimize:
    - cd: "{{release_path}}"
    - run: "{{bin/php}} artisan filament:optimize"
    - run: "{{bin/php}} artisan filament:cache-components"

  # 检查队列状态
  queue:status:
    - run: "sudo supervisorctl status all"

  # 检查所有服务状态
  supervisor:status:
    - run: "sudo supervisorctl status all"

# 部署流程 Hooks
after:
  deploy:vendors: npm:build
  deploy:symlink:
    - artisan:cache:clear
    - artisan:filament:optimize
  deploy:failed: deploy:unlock

before:
  deploy:symlink:
    - artisan:cache:clear
    - artisan:filament:optimize
