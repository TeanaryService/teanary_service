<svg xmlns="http://www.w3.org/2000/svg" width="200px" height="200px">
  <!-- 红色印章背景 -->
  <rect x="5" y="5" width="190" height="190" rx="6" fill="#a40000" />

  <!-- “茶”字，使用仿宋或楷体，或篆书字体（需替换字体） -->
  <text x="100" y="128" text-anchor="middle" dominant-baseline="middle"
        font-size="180" font-family="KaiTi" fill="white">
    茶
  </text>

  <!-- 十字定位线（可删） -->
  <line x1="5" y1="100" x2="195" y2="100" stroke="white" stroke-width="1"
        stroke-dasharray="4,4" opacity="0.3" />
  <line x1="100" y1="5" x2="100" y2="195" stroke="white" stroke-width="1"
        stroke-dasharray="4,4" opacity="0.3" />
</svg>
